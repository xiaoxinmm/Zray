name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cli:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build server
        if: matrix.goos == 'linux'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w" -o build/zray-server-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/zray-server/
          cd build && tar czf zray-server-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz zray-server-*

      - name: Build client
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          EXT=""
          [ "${{ matrix.goos }}" = "windows" ] && EXT=".exe"
          go build -ldflags="-s -w" -o build/zray-client-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} ./cmd/zray-client/
          cd build && tar czf zray-client-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz zray-client-*

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/*.tar.gz

  build-windows-gui:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Windows GUI
        run: |
          go build -ldflags="-s -w -H windowsgui" -o build/zray-gui-windows-amd64.exe ./cmd/zray-gui/
        env:
          CGO_ENABLED: 0

      - uses: actions/upload-artifact@v4
        with:
          name: windows-gui
          path: build/zray-gui-windows-amd64.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Build Android AAR
        run: |
          cd android/zraylib
          gomobile bind -target=android -androidapi 21 -o ../../build/zraylib.aar .
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Build Android APK
        run: |
          cd android/app
          chmod +x gradlew
          ./gradlew assembleRelease
          cp app/build/outputs/apk/release/app-release-unsigned.apk ../../build/zray-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            build/zraylib.aar
            build/zray-android.apk

  release:
    needs: [build-cli, build-windows-gui, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.exe
            artifacts/**/*.apk
            artifacts/**/*.aar
          generate_release_notes: true
