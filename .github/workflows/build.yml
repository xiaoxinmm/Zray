name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Tidy modules
        run: go mod tidy

      - name: Build Windows CLI client
        run: |
          go build -ldflags="-s -w" -o build/zray-client.exe ./cmd/zray-client/
        env:
          CGO_ENABLED: 0
          GOOS: windows
          GOARCH: amd64

      - name: Build Windows GUI client
        run: |
          go build -ldflags="-s -w -H windowsgui" -o build/zray-gui.exe ./cmd/zray-gui/
        env:
          CGO_ENABLED: 0
          GOOS: windows
          GOARCH: amd64

      - name: Build Windows Server
        run: |
          go build -ldflags="-s -w" -o build/zray-server.exe ./cmd/zray-server/
        env:
          CGO_ENABLED: 0
          GOOS: windows
          GOARCH: amd64

      - name: Package
        run: |
          cd build
          copy ..\configs\client.example.json config.json
          copy ..\rules\geosite-cn.txt geosite-cn.txt

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            build/zray-client.exe
            build/zray-gui.exe
            build/zray-server.exe
            build/config.json
            build/geosite-cn.txt

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile init

      - name: Build Android AAR
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          cd android/zraylib
          go mod tidy
          gomobile bind -target=android/arm64 -androidapi 24 -o ../../build/zraylib.aar .

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: build/zraylib.aar

  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package Windows
        run: |
          cd artifacts/windows
          zip -r ../../ZRay-Windows-v${{ github.ref_name }}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ZRay-Windows-*.zip
            artifacts/android/zraylib.aar
          generate_release_notes: true
