name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Tidy modules
        run: go mod tidy

      - name: Build Windows CLI client
        run: go build -ldflags="-s -w" -o build/zray-client.exe ./cmd/zray-client/
        env:
          CGO_ENABLED: 0
          GOOS: windows
          GOARCH: amd64

      - name: Build Windows GUI client
        run: go build -ldflags="-s -w -H windowsgui" -o build/zray-gui.exe ./cmd/zray-gui/
        env:
          CGO_ENABLED: 0
          GOOS: windows
          GOARCH: amd64

      - name: Package
        run: |
          copy configs\client.example.json build\config.json
          copy rules\geosite-cn.txt build\geosite-cn.txt

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            build/zray-client.exe
            build/zray-gui.exe
            build/config.json
            build/geosite-cn.txt

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Tidy Go modules
        run: go mod tidy

      - name: Build Go binary for Android arm64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -ldflags="-s -w" -o android/app/src/main/assets/zray-client-android-arm64 ./cmd/zray-client/

      - name: Copy geosite rules to assets
        run: |
          cp rules/geosite-cn.txt android/app/src/main/assets/geosite-cn.txt

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        working-directory: android
        run: gradle assembleRelease --no-daemon

      - name: Find and copy APK
        run: |
          mkdir -p build
          find android -name "*.apk" -exec cp {} build/ZRay-Android.apk \; 2>/dev/null || true
          # If no APK, package the binary as fallback
          if [ ! -f build/ZRay-Android.apk ]; then
            cp android/app/src/main/assets/zray-client-android-arm64 build/
            cp rules/geosite-cn.txt build/
            cp configs/client.example.json build/config.json
            cd build && tar czf ZRay-Android.tar.gz zray-client-android-arm64 config.json geosite-cn.txt
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            build/ZRay-Android.apk
            build/ZRay-Android.tar.gz

  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package Windows
        run: |
          cd artifacts/windows
          zip -r ../../ZRay-Windows.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ZRay-Windows.zip
            artifacts/android/*
          generate_release_notes: true
