name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Tidy modules
        run: go mod tidy

      - name: Build Windows CLI client
        run: go build -ldflags="-s -w" -o build/zray-client.exe ./cmd/zray-client/
        env:
          CGO_ENABLED: 0
          GOOS: windows
          GOARCH: amd64

      - name: Build Windows GUI client
        run: go build -ldflags="-s -w -H windowsgui" -o build/zray-gui.exe ./cmd/zray-gui/
        env:
          CGO_ENABLED: 0
          GOOS: windows
          GOARCH: amd64

      - name: Package
        run: |
          copy configs\client.example.json build\config.json
          copy rules\geosite-cn.txt build\geosite-cn.txt

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            build/zray-client.exe
            build/zray-gui.exe
            build/config.json
            build/geosite-cn.txt

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Tidy modules
        run: go mod tidy

      - name: Build Android arm64 binary
        run: |
          mkdir -p build
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -ldflags="-s -w" -o build/zray-client-android-arm64 ./cmd/zray-client/

      - name: Package
        run: |
          cp configs/client.example.json build/config.json
          cp rules/geosite-cn.txt build/geosite-cn.txt
          cd build && tar czf zray-android.tar.gz zray-client-android-arm64 config.json geosite-cn.txt

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: build/zray-android.tar.gz

  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package Windows
        run: |
          cd artifacts/windows
          zip -r ../../ZRay-Windows.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ZRay-Windows.zip
            artifacts/android/zray-android.tar.gz
          generate_release_notes: true
